<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Room Details | Hostel Mart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="global.js" defer></script>
  <script src="footer.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    /* --- MODERN CSS VARIABLES --- */
    :root {
      --bg-main: #ffffff;
      --bg-header: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --btn-border: #0f172a;
      --btn-text: #0f172a;
      --btn-hover-bg: #0f172a;
      --btn-hover-text: #ffffff;
      --accent: #2563eb;
      --danger: #ef4444;
      --skeleton-bg: #f1f5f9;
      --skeleton-shimmer: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);
    }

    body.dark-mode {
      --bg-main: #0f172a;
      --bg-header: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: #1e293b;
      --card-border: #334155;
      --btn-border: #ffffff;
      --btn-text: #ffffff;
      --btn-hover-bg: #ffffff;
      --btn-hover-text: #0f172a;
      --skeleton-bg: #334155;
      --skeleton-shimmer: linear-gradient(90deg, #334155 0%, #475569 50%, #334155 100%);
    }

    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); transition: 0.3s; min-height: 100vh; }
    .logo-font { font-family: 'Outfit', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }

    header { background: var(--bg-header); padding: 14px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 0 var(--card-border); position: sticky; top: 0; z-index: 100; }
    
    .btn { 
      padding: 10px 22px; border-radius: 8px; border: 1.5px solid var(--btn-border); background: transparent; 
      color: var(--btn-text); font-weight: 600; font-size: 13px; text-decoration: none; transition: 0.3s; 
      display: inline-block; cursor: pointer; text-align: center; font-family: 'Outfit', sans-serif; letter-spacing: 0.5px;
    }
    .btn:hover { background: var(--btn-hover-bg); color: var(--btn-hover-text); transform: translateY(-2px); }
    .btn-secondary { background: transparent; border-color: var(--card-border); color: var(--text-muted); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: white; }
    .btn-sm { padding: 8px 14px; font-size: 11px; }

    .product-container { max-width: 1200px; margin: 40px auto; padding: 0 5%; display: grid; grid-template-columns: 1.1fr 1fr; gap: 60px; }
    
    .gallery-container { display: flex; flex-direction: column; gap: 16px; }
    .main-image-wrapper { 
      background: var(--card-bg); border-radius: 28px; border: 1px solid var(--card-border); 
      display: flex; align-items: center; justify-content: center; height: 500px; position: relative; overflow: hidden;
    }
    .main-image-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }

    .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px); color: var(--btn-text); border: 1px solid var(--card-border);
      width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; 
      justify-content: center; opacity: 0; transition: 0.3s; z-index: 2;
    }
    .main-image-wrapper:hover .nav-arrow { opacity: 1; }
    .arrow-left { left: 20px; }
    .arrow-right { right: 20px; }

    .thumbnail-row { display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px; }
    .thumb-wrapper { position: relative; flex-shrink: 0; }
    .thumb-img { width: 75px; height: 75px; object-fit: cover; border-radius: 14px; cursor: pointer; opacity: 0.6; border: 2px solid transparent; transition: 0.3s; }
    .thumb-img.active { border-color: var(--btn-border); opacity: 1; transform: translateY(-3px); }
    
    .delete-action-btn { 
        position: absolute; top: -8px; right: -8px; background: var(--danger); color: white; width: 22px; height: 22px; 
        border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--bg-main);
        box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 10;
    }
    .thumb-wrapper:hover .delete-action-btn { display: flex; }

    /* --- EDITABLE STYLES --- */
    .editable-group { position: relative; display: flex; align-items: center; gap: 12px; width: 100%; margin-bottom: 5px; }
    .edit-icon { cursor: pointer; width: 16px; height: 16px; opacity: 0; transition: 0.2s; color: var(--text-muted); display: none; }
    .editable-group:hover .edit-icon { opacity: 0.7; }
    .edit-icon:hover { color: var(--accent); opacity: 1 !important; }

    .inline-edit-input { font-family: 'Inter', sans-serif; font-size: inherit; background: var(--card-bg); border: 1.5px solid var(--card-border); border-radius: 10px; padding: 10px 14px; width: 100%; outline: none; box-sizing: border-box; transition: 0.2s; }

    .product-title { margin: 0; font-size: 42px; font-weight: 700; font-family: 'Outfit', sans-serif; line-height: 1.1; }
    .price { font-size: 36px; font-weight: 800; color: #10b981; font-family: 'Outfit', sans-serif; }
    
    .info-row { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-weight: 500; font-size: 15px; margin-bottom: 10px; }
    .icon-svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; flex-shrink: 0; stroke-linecap: round; stroke-linejoin: round; }

    .badge-row { display: flex; gap: 10px; margin: 15px 0; }
    .badge { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: 50px; text-transform: uppercase; }
    .badge-vacant { background: #fee2e2; color: #ef4444; }
    .badge-food { background: #dcfce7; color: #16a34a; }

    .description { font-size: 16px; line-height: 1.8; white-space: pre-wrap; color: var(--text-muted); margin-top: 10px; }

    .institute-box { border: 1px solid var(--card-border); border-radius: 16px; padding: 15px; margin-bottom: 20px; background: var(--bg-main); }
    .inst-item { display: flex; justify-content: space-between; font-size: 14px; padding: 10px 0; border-bottom: 1px solid var(--card-border); align-items: center; }
    .inst-item:last-child { border: none; }
    
    .remove-inst-btn { color: var(--danger); cursor: pointer; padding: 5px; opacity: 0.6; transition: 0.2s; }

    .contact-section { padding-top: 30px; border-top: 1px solid var(--card-border); margin-top: 30px; }
    .contact-number { font-size: 24px; font-weight: 800; font-family: 'Outfit', sans-serif; color: var(--text-main); margin-top: 5px; }

    /* --- SKELETON STYLES --- */
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .skeleton { background: var(--skeleton-shimmer); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; }
    .skeleton-box { border-radius: 28px; width: 100%; height: 500px; }
    .skeleton-text { height: 20px; background: var(--skeleton-bg); border-radius: 6px; margin-bottom: 15px; }
    .skeleton-badge { width: 100px; height: 25px; border-radius: 50px; }
    .skeleton-title { width: 85%; height: 45px; }
    .skeleton-price { width: 45%; height: 40px; }
    .skeleton-thumb { width: 75px; height: 75px; border-radius: 14px; }

    @media (max-width: 768px) { .product-container { grid-template-columns: 1fr; gap: 40px; } .main-image-wrapper, .skeleton-box { height: 400px; } }
  </style>
</head>
<body>

<script>
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
</script>

<header>
  <h2 class="logo-font">Hostel Mart</h2>
  <div class="header-actions">
    <a href="hostel.html" class="btn btn-sm btn-secondary">← BACK TO FINDER</a>
  </div>
</header>

<div class="product-container" id="skeletonState">
    <div class="gallery-container">
        <div class="skeleton-box skeleton"></div>
        <div class="thumbnail-row">
            <div class="skeleton-thumb skeleton"></div>
            <div class="skeleton-thumb skeleton"></div>
            <div class="skeleton-thumb skeleton"></div>
        </div>
    </div>
    <div class="details-section">
        <div class="skeleton-text skeleton-title skeleton"></div>
        <div class="badge-row">
            <div class="skeleton-badge skeleton"></div>
            <div class="skeleton-badge skeleton"></div>
        </div>
        <div class="skeleton-text skeleton-price skeleton"></div>
        <div style="margin-top: 30px;">
            <div class="skeleton-text skeleton" style="height: 100px; width: 100%;"></div>
            <div class="skeleton-text skeleton" style="width: 70%; margin-top: 20px;"></div>
        </div>
    </div>
</div>

<div class="product-container" id="roomContent" style="display: none;">
  
  <div class="gallery-container">
    <div class="main-image-wrapper">
      <button class="nav-arrow arrow-left" id="prevBtn" onclick="changeImage(-1)">❮</button>
      <img id="mainRoomImage" src="" alt="Room">
      <button class="nav-arrow arrow-right" id="nextBtn" onclick="changeImage(1)">❯</button>
    </div>
    <div class="thumbnail-row" id="thumbnailRow"></div>
    
    <div id="ownerImageAction" style="display:none; margin-top:10px;">
        <input type="file" id="newImageUpload" multiple accept="image/*" style="display:none;" onchange="handleImageUpdate(event)">
        <button id="uploadPhotosBtn" class="btn btn-sm btn-secondary" style="width:100%; border-style: dashed;" onclick="document.getElementById('newImageUpload').click()">+ ADD MORE PHOTOS</button>
    </div>
  </div>

  <div class="details-section">
    <div class="editable-group">
        <h1 class="product-title" id="roomTitleDisplay">Hostel Name</h1>
        <svg class="edit-icon" onclick="startEdit('roomTitle')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        <div id="roomTitleEdit" style="display:none; width:100%;">
            <input type="text" id="roomTitleInput" class="inline-edit-input">
            <div style="display:flex; gap:8px; margin-top:10px;"><button class="btn btn-sm" onclick="saveEdit('hostel_name', 'roomTitle')">SAVE</button><button class="btn btn-sm btn-secondary" onclick="cancelEdit('roomTitle')">CANCEL</button></div>
        </div>
    </div>
    
    <div class="badge-row">
      <span class="badge badge-vacant" id="vacatingBadge">Vacating: --</span>
      <span class="badge badge-food" id="foodBadge">Food: --</span>
    </div>

    <div class="editable-group">
        <div class="price">₹<span id="roomRentDisplay">0</span><span style="font-size: 14px; opacity: 0.6; font-weight: 500;">/month</span></div>
        <svg class="edit-icon" onclick="startEdit('roomRent')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        <div id="roomRentEdit" style="display:none; width:100%;">
            <input type="number" id="roomRentInput" class="inline-edit-input">
            <div style="display:flex; gap:8px; margin-top:10px;"><button class="btn btn-sm" onclick="saveEdit('rent', 'roomRent')">SAVE</button><button class="btn btn-sm btn-secondary" onclick="cancelEdit('roomRent')">CANCEL</button></div>
        </div>
    </div>

    <div class="editable-group">
        <div class="info-row">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <span id="roomLocationDisplay">Location</span>
        </div>
        <svg class="edit-icon" onclick="startEdit('roomLocation')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        <div id="roomLocationEdit" style="display:none; width:100%;">
            <input type="text" id="roomLocationInput" class="inline-edit-input">
            <div style="display:flex; gap:8px; margin-top:10px;"><button class="btn btn-sm" onclick="saveEdit('location', 'roomLocation')">SAVE</button><button class="btn btn-sm btn-secondary" onclick="cancelEdit('roomLocation')">CANCEL</button></div>
        </div>
    </div>

    <div style="display:flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 10px;">
        <h3 class="logo-font" style="font-size:13px; opacity:0.8; margin:0;">NEARBY INSTITUTIONS</h3>
        <button id="addInstBtn" class="btn btn-sm btn-secondary" style="padding: 4px 8px; display:none;" onclick="toggleInstForm()">+</button>
    </div>

    <div id="addInstForm" style="display:none; background: var(--bg-header); border: 1px solid var(--card-border); padding: 15px; border-radius: 12px; margin-bottom: 20px;">
        <div class="form-group" style="margin-bottom:10px;">
            <label style="font-size:10px;">Institution Name</label>
            <input type="text" id="newInstName" placeholder="e.g. College Name" class="inline-edit-input">
        </div>
        <div class="form-group" style="margin-bottom:15px;">
            <label style="font-size:10px;">Distance (KM)</label>
            <input type="number" id="newInstDist" placeholder="e.g. 2" class="inline-edit-input">
        </div>
        <div style="display:flex; gap: 8px;">
            <button id="submitInstBtn" class="btn btn-sm" style="flex:1" onclick="addInstitution()">ADD</button>
            <button class="btn btn-sm btn-secondary" onclick="toggleInstForm()">CANCEL</button>
        </div>
    </div>

    <div class="institute-box" id="instituteList"></div>

    <h3 class="logo-font" style="font-size:13px; margin-top:10px; opacity:0.6;">ROOM DETAILS</h3>
    <div class="editable-group">
        <div class="description" id="roomDescriptionDisplay">Description...</div>
        <svg class="edit-icon" onclick="startEdit('roomDescription')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        <div id="roomDescriptionEdit" style="display:none; width:100%;">
            <textarea id="roomDescriptionInput" class="inline-edit-input" style="height:120px;"></textarea>
            <div style="display:flex; gap:8px; margin-top:10px;"><button class="btn btn-sm" onclick="saveEdit('sharing_type', 'roomDescription')">SAVE</button><button class="btn btn-sm btn-secondary" onclick="cancelEdit('roomDescription')">CANCEL</button></div>
        </div>
    </div>

    <div class="contact-section">
      <div class="info-row" style="margin-bottom: 5px; opacity: 0.6; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        Owner Contact
      </div>
      <div class="contact-number" id="phoneNumber">--</div>
      <button class="btn btn-danger btn-sm" style="width:100%; margin-top: 40px; display:none;" id="deleteBtn" onclick="deleteRoom()">REMOVE THIS LISTING</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://uluwxacapyysyuwpmqtz.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsdXd4YWNhcHl5c3l1d3BtcXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODc0ODQsImV4cCI6MjA4NzI2MzQ4NH0.8dOeocJ5Q2tKy6gDu7rAmWgQqv_oetEXSGH2kWljZJo";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentRoomId, roomData, currentUser;
  let currentImageIndex = 0; 

  async function init() {
    currentRoomId = localStorage.getItem("item_id");
    const { data: { session } } = await supabaseClient.auth.getSession();
    currentUser = session?.user;

    const { data, error } = await supabaseClient.from("hostels").select("*").eq("id", currentRoomId).single();
    if (error) {
        document.getElementById("skeletonState").style.display = "none";
        document.body.innerHTML += `<div style="text-align:center; margin-top:100px; font-family:'Outfit'; opacity:0.5;">Room not found.</div>`;
        return;
    }
    
    roomData = data;
    document.getElementById("skeletonState").style.display = "none";
    document.getElementById("roomContent").style.display = "grid";

    updateUI();

    if (currentUser && currentUser.id === data.user_id) {
      document.querySelectorAll(".edit-icon").forEach(el => el.style.display = "inline");
      document.getElementById("deleteBtn").style.display = "block";
      document.getElementById("ownerImageAction").style.display = "block";
      document.getElementById("addInstBtn").style.display = "block";
    }
  }

  function updateUI() {
    document.getElementById("roomTitleDisplay").innerText = roomData.hostel_name;
    document.getElementById("roomRentDisplay").innerText = roomData.rent;
    document.getElementById("roomLocationDisplay").innerText = roomData.location;
    document.getElementById("roomDescriptionDisplay").innerText = roomData.sharing_type || "No extra details provided.";
    document.getElementById("phoneNumber").innerText = roomData.contact_number;
    document.getElementById("vacatingBadge").innerText = "Available: " + new Date(roomData.vacating_date).toLocaleDateString();
    document.getElementById("foodBadge").innerText = "Food: " + roomData.food_status;
    
    renderInstitutions();
    renderGallery();
  }

  function renderInstitutions() {
    const instList = document.getElementById("instituteList");
    instList.innerHTML = "";
    if(roomData.nearby_institutions && Array.isArray(roomData.nearby_institutions) && roomData.nearby_institutions.length > 0) {
      roomData.nearby_institutions.forEach((inst, i) => {
        instList.innerHTML += `
            <div class="inst-item">
                <span>🎓 ${inst.name}</span>
                <div style="display:flex; align-items:center; gap:12px;">
                    <strong>${inst.dist} km</strong>
                    ${currentUser?.id === roomData.user_id ? `
                    <svg class="remove-inst-btn" onclick="removeInstitution(${i})" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>` : ''}
                </div>
            </div>`;
      });
    } else {
      instList.innerHTML = "<p style='font-size:13px; opacity:0.5;'>No nearby institutions listed.</p>";
    }
  }

  function toggleInstForm() {
    const form = document.getElementById('addInstForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
  }

  async function addInstitution() {
    const name = document.getElementById('newInstName').value.trim();
    const dist = document.getElementById('newInstDist').value.trim();
    if(!name || !dist) return alert("Fill both fields");
    const submitBtn = document.getElementById('submitInstBtn');
    submitBtn.innerText = "⏳";
    const newList = Array.isArray(roomData.nearby_institutions) ? [...roomData.nearby_institutions, { name, dist }] : [{ name, dist }];
    const { error } = await supabaseClient.from("hostels").update({ nearby_institutions: newList }).eq("id", currentRoomId);
    if(!error) { 
        roomData.nearby_institutions = newList; 
        renderInstitutions(); 
        toggleInstForm();
        document.getElementById('newInstName').value = "";
        document.getElementById('newInstDist').value = "";
    } else { alert("Failed to save: " + error.message); }
    submitBtn.innerText = "ADD";
  }

  async function removeInstitution(index) {
    if(!confirm("Remove this institution?")) return;
    const newList = roomData.nearby_institutions.filter((_, i) => i !== index);
    const { error } = await supabaseClient.from("hostels").update({ nearby_institutions: newList }).eq("id", currentRoomId);
    if(!error) { roomData.nearby_institutions = newList; renderInstitutions(); }
    else { alert("Failed to remove: " + error.message); }
  }

  function renderGallery() {
    const urls = roomData.image_urls || [];
    const mainImg = document.getElementById("mainRoomImage");
    const thumbRow = document.getElementById("thumbnailRow");
    thumbRow.innerHTML = "";
    if (urls.length === 0) {
      mainImg.src = "https://via.placeholder.com/800x800?text=No+Images";
      return;
    }
    document.getElementById("prevBtn").style.display = urls.length > 1 ? "flex" : "none";
    document.getElementById("nextBtn").style.display = urls.length > 1 ? "flex" : "none";
    mainImg.src = urls[currentImageIndex];
    urls.forEach((url, i) => {
      const wrapper = document.createElement("div");
      wrapper.className = "thumb-wrapper";
      wrapper.innerHTML = `
        <img src="${url}" class="thumb-img ${i === currentImageIndex ? 'active' : ''}" onclick="currentImageIndex = ${i}; updateMainImage();">
        ${currentUser?.id === roomData.user_id ? `
        <div class="delete-action-btn" onclick="removeImage(${i})">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="4"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </div>` : ''}
      `;
      thumbRow.appendChild(wrapper);
    });
  }

  function changeImage(direction) {
    const urls = roomData.image_urls || [];
    if(urls.length === 0) return;
    currentImageIndex = (currentImageIndex + direction + urls.length) % urls.length;
    updateMainImage();
  }

  function updateMainImage() {
    const urls = roomData.image_urls || [];
    document.getElementById("mainRoomImage").src = urls[currentImageIndex];
    document.querySelectorAll(".thumb-img").forEach((t, i) => t.classList.toggle("active", i === currentImageIndex));
  }

  async function handleImageUpdate(e) {
    const files = Array.from(e.target.files);
    const btn = document.getElementById("uploadPhotosBtn");
    btn.innerText = "UPLOADING...";
    const newUrls = Array.isArray(roomData.image_urls) ? [...roomData.image_urls] : [];
    for (let f of files) {
      const path = `${currentUser.id}/${Date.now()}-${f.name}`;
      const { data, error } = await supabaseClient.storage.from('item-images').upload(path, f);
      if(data) {
        const { data: pUrl } = supabaseClient.storage.from('item-images').getPublicUrl(path);
        newUrls.push(pUrl.publicUrl);
      }
    }
    const { error } = await supabaseClient.from("hostels").update({ image_urls: newUrls }).eq("id", currentRoomId);
    if(!error) { roomData.image_urls = newUrls; renderGallery(); }
    else { alert("Photo upload failed: " + error.message); }
    btn.innerText = "+ ADD MORE PHOTOS";
  }

  async function removeImage(index) {
    if(!confirm("Delete this photo?")) return;
    const newUrls = roomData.image_urls.filter((_, i) => i !== index);
    const { error } = await supabaseClient.from("hostels").update({ image_urls: newUrls }).eq("id", currentRoomId);
    if(!error) { roomData.image_urls = newUrls; currentImageIndex = 0; renderGallery(); }
    else { alert("Failed to delete photo: " + error.message); }
  }

  function startEdit(fieldId) {
    document.getElementById(fieldId + "Display").style.display = "none";
    document.getElementById(fieldId + "Edit").style.display = "block";
    const mapping = { roomTitle: 'hostel_name', roomRent: 'rent', roomLocation: 'location', roomDescription: 'sharing_type' };
    document.getElementById(fieldId + "Input").value = roomData[mapping[fieldId]] || '';
  }

  function cancelEdit(fieldId) {
    document.getElementById(fieldId + "Display").style.display = "block";
    document.getElementById(fieldId + "Edit").style.display = "none";
  }

  async function saveEdit(dbField, fieldId) {
    const newValue = document.getElementById(fieldId + "Input").value.trim();
    if(!newValue && dbField !== 'sharing_type') return alert("Field cannot be empty");
    const { error } = await supabaseClient.from("hostels").update({ [dbField]: newValue }).eq("id", currentRoomId);
    if (!error) { roomData[dbField] = newValue; updateUI(); cancelEdit(fieldId); }
    else { alert("Save failed: " + error.message); }
  }

  async function deleteRoom() {
    if (!confirm("Remove room listing permanently?")) return;
    const { error } = await supabaseClient.from("hostels").delete().eq("id", currentRoomId);
    if (!error) window.location.href = "hostel.html";
    else alert("Deletion failed: " + error.message);
  }

  init();
</script>
</body>
</html>
