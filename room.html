<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Room Details | Hostel Mart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    /* --- MODERN CSS VARIABLES --- */
    :root {
      --bg-main: #ffffff;
      --bg-header: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --btn-border: #0f172a;
      --btn-text: #0f172a;
      --btn-hover-bg: #0f172a;
      --btn-hover-text: #ffffff;
      --accent: #2563eb;
    }

    body.dark-mode {
      --bg-main: #0f172a;
      --bg-header: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: #1e293b;
      --card-border: #334155;
      --btn-border: #ffffff;
      --btn-text: #ffffff;
      --btn-hover-bg: #ffffff;
      --btn-hover-text: #0f172a;
    }

    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); transition: 0.3s; }
    
    .logo-font { font-family: 'Outfit', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }

    header { background: var(--bg-header); padding: 14px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 0 var(--card-border); position: sticky; top: 0; z-index: 100; }
    header h2 { margin: 0; font-size: 20px; color: var(--btn-border); }

    .btn { 
      padding: 10px 22px; border-radius: 8px; border: 1.5px solid var(--btn-border); background: transparent; 
      color: var(--btn-text); font-weight: 600; font-size: 13px; text-decoration: none; transition: 0.3s; 
      display: inline-block; cursor: pointer; font-family: 'Outfit', sans-serif; letter-spacing: 0.5px;
    }
    .btn:hover { background: var(--btn-hover-bg); color: var(--btn-hover-text); transform: translateY(-2px); }
    .btn-secondary { background: transparent; border-color: var(--card-border); color: var(--text-muted); }
    .btn-danger { border-color: #ef4444; color: #ef4444; margin-top: 50px; }
    .btn-danger:hover { background: #ef4444; color: white; }

    .product-container { max-width: 1200px; margin: 40px auto; padding: 0 5%; display: grid; grid-template-columns: 1.1fr 1fr; gap: 60px; }
    
    .gallery-container { display: flex; flex-direction: column; gap: 16px; }
    .main-image-wrapper { 
      background: var(--card-bg); border-radius: 28px; border: 1px solid var(--card-border); 
      display: flex; align-items: center; justify-content: center; height: 500px; position: relative; overflow: hidden;
    }
    .main-image-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; }

    .nav-arrow {
      position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px); color: var(--btn-text); border: 1px solid var(--card-border);
      width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; 
      justify-content: center; opacity: 0; transition: 0.3s; z-index: 2;
    }
    .main-image-wrapper:hover .nav-arrow { opacity: 1; }
    .arrow-left { left: 20px; }
    .arrow-right { right: 20px; }

    .thumbnail-row { display: flex; gap: 12px; overflow-x: auto; padding: 5px; }
    .thumb-img { width: 75px; height: 75px; object-fit: cover; border-radius: 14px; cursor: pointer; opacity: 0.5; border: 2px solid transparent; transition: 0.3s; }
    .thumb-img.active { border-color: var(--btn-border); opacity: 1; transform: translateY(-3px); }

    /* --- EDITABLE STYLES --- */
    .editable-group { position: relative; display: flex; align-items: center; gap: 12px; width: 100%; margin-bottom: 5px; }
    
    /* Slick Pencil Icon Style */
    .edit-icon { 
      cursor: pointer; 
      width: 16px; 
      height: 16px; 
      opacity: 0; 
      transition: 0.2s; 
      color: var(--text-muted); 
      display: none; 
      flex-shrink: 0;
    }
    .editable-group:hover .edit-icon { opacity: 0.7; }
    .edit-icon:hover { color: var(--accent); opacity: 1 !important; }

    .inline-edit-input { font-family: 'Inter', sans-serif; font-size: inherit; background: var(--card-bg); border: 1.5px solid var(--btn-border); border-radius: 10px; padding: 10px 14px; width: 100%; outline: none; box-sizing: border-box; }

    .product-title { margin: 0; font-size: 42px; font-weight: 700; font-family: 'Outfit', sans-serif; line-height: 1.1; }
    .price { font-size: 36px; font-weight: 800; color: #10b981; font-family: 'Outfit', sans-serif; }
    
    .info-row { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-weight: 500; font-size: 15px; margin-bottom: 10px; }
    .icon-svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; flex-shrink: 0; stroke-linecap: round; stroke-linejoin: round; }

    .badge-row { display: flex; gap: 10px; margin: 15px 0; }
    .badge { font-family: 'Outfit', sans-serif; font-size: 11px; font-weight: 700; padding: 6px 14px; border-radius: 50px; text-transform: uppercase; }
    .badge-vacant { background: #fee2e2; color: #ef4444; }
    .badge-food { background: #dcfce7; color: #16a34a; }

    .description { font-size: 16px; line-height: 1.8; white-space: pre-wrap; color: var(--text-muted); margin-top: 10px; }

    .institute-box { border: 1px solid var(--card-border); border-radius: 16px; padding: 15px; margin-bottom: 30px; background: var(--bg-main); }
    .inst-item { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid var(--card-border); }
    .inst-item:last-child { border: none; }

    .contact-section { padding-top: 30px; border-top: 1px solid var(--card-border); margin-top: 30px; }
    .contact-number { font-size: 24px; font-weight: 800; font-family: 'Outfit', sans-serif; color: var(--text-main); margin-top: 5px; display: flex; align-items: center; gap: 10px; }

    @media (max-width: 768px) { .product-container { grid-template-columns: 1fr; gap: 40px; } .main-image-wrapper { height: 400px; } }
  </style>
</head>
<body>

<script>
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
</script>

<header>
  <h2 class="logo-font">Hostel Mart</h2>
  <div class="header-actions">
    <a href="hostel.html" class="btn btn-sm btn-secondary">← BACK TO FINDER</a>
  </div>
</header>

<div id="loadingMsg" style="text-align:center; margin-top:100px; font-family:'Outfit'; opacity:0.5; letter-spacing: 2px;">SYNCING ROOM...</div>

<div class="product-container" id="roomContent" style="display: none;">
  
  <div class="gallery-container">
    <div class="main-image-wrapper">
      <button class="nav-arrow arrow-left" id="prevBtn" onclick="changeImage(-1)">❮</button>
      <img id="mainRoomImage" src="" alt="Room">
      <button class="nav-arrow arrow-right" id="nextBtn" onclick="changeImage(1)">❯</button>
    </div>
    <div class="thumbnail-row" id="thumbnailRow"></div>
  </div>

  <div class="details-section">
    <div class="editable-group">
        <h1 class="product-title" id="roomTitleDisplay">Hostel Name</h1>
        <svg class="edit-icon" onclick="startEdit('roomTitle')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <div id="roomTitleEdit" style="display:none; width:100%;">
            <input type="text" id="roomTitleInput" class="inline-edit-input">
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-sm" onclick="saveEdit('hostel_name', 'roomTitle')">SAVE</button>
                <button class="btn btn-sm btn-secondary" onclick="cancelEdit('roomTitle')">CANCEL</button>
            </div>
        </div>
    </div>
    
    <div class="badge-row">
      <span class="badge badge-vacant" id="vacatingBadge">Vacating: --</span>
      <span class="badge badge-food" id="foodBadge">Food: --</span>
    </div>

    <div class="editable-group">
        <div class="price">₹<span id="roomRentDisplay">0</span><span style="font-size: 14px; opacity: 0.6; font-weight: 500;">/month</span></div>
        <svg class="edit-icon" onclick="startEdit('roomRent')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <div id="roomRentEdit" style="display:none; width:100%;">
            <input type="number" id="roomRentInput" class="inline-edit-input">
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-sm" onclick="saveEdit('rent', 'roomRent')">SAVE</button>
                <button class="btn btn-sm btn-secondary" onclick="cancelEdit('roomRent')">CANCEL</button>
            </div>
        </div>
    </div>

    <div class="editable-group">
        <div class="info-row">
            <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <span id="roomLocationDisplay">Location</span>
        </div>
        <svg class="edit-icon" onclick="startEdit('roomLocation')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <div id="roomLocationEdit" style="display:none; width:100%;">
            <input type="text" id="roomLocationInput" class="inline-edit-input">
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-sm" onclick="saveEdit('location', 'roomLocation')">SAVE</button>
                <button class="btn btn-sm btn-secondary" onclick="cancelEdit('roomLocation')">CANCEL</button>
            </div>
        </div>
    </div>

    <h3 class="logo-font" style="font-size:13px; margin-top:20px; opacity:0.6;">NEARBY INSTITUTIONS</h3>
    <div class="institute-box" id="instituteList"></div>

    <h3 class="logo-font" style="font-size:13px; margin-top:10px; opacity:0.6;">ROOM DETAILS</h3>
    <div class="editable-group">
        <div class="description" id="roomDescriptionDisplay">Description...</div>
        <svg class="edit-icon" onclick="startEdit('roomDescription')" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <div id="roomDescriptionEdit" style="display:none; width:100%;">
            <textarea id="roomDescriptionInput" class="inline-edit-input" style="height:120px;"></textarea>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-sm" onclick="saveEdit('sharing_type', 'roomDescription')">SAVE</button>
                <button class="btn btn-sm btn-secondary" onclick="cancelEdit('roomDescription')">CANCEL</button>
            </div>
        </div>
    </div>

    <div class="contact-section">
      <div class="info-row" style="margin-bottom: 5px; opacity: 0.6; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        Owner Contact
      </div>
      <div class="contact-number" id="phoneNumber">--</div>
      
      <button class="btn btn-danger btn-sm" style="width:100%; display:none; margin-top: 40px;" id="deleteBtn" onclick="deleteRoom()">REMOVE THIS LISTING</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://uluwxacapyysyuwpmqtz.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsdXd4YWNhcHl5c3l1d3BtcXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODc0ODQsImV4cCI6MjA4NzI2MzQ4NH0.8dOeocJ5Q2tKy6gDu7rAmWgQqv_oetEXSGH2kWljZJo";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentRoomId, roomData;
  let currentImageIndex = 0; 

  async function init() {
    currentRoomId = localStorage.getItem("item_id");
    const { data: { session } } = await supabaseClient.auth.getSession();
    const currentUser = session?.user;

    const { data, error } = await supabaseClient.from("hostels").select("*").eq("id", currentRoomId).single();
    if (error) return document.getElementById("loadingMsg").innerText = "Room not found.";
    
    roomData = data;
    document.getElementById("loadingMsg").style.display = "none";
    document.getElementById("roomContent").style.display = "grid";

    document.getElementById("roomTitleDisplay").innerText = data.hostel_name;
    document.getElementById("roomRentDisplay").innerText = data.rent;
    document.getElementById("roomLocationDisplay").innerText = data.location;
    document.getElementById("roomDescriptionDisplay").innerText = data.sharing_type || "No extra details provided.";
    document.getElementById("phoneNumber").innerText = data.contact_number;
    document.getElementById("vacatingBadge").innerText = "Available: " + new Date(data.vacating_date).toLocaleDateString();
    document.getElementById("foodBadge").innerText = "Food: " + data.food_status;
    
    const instList = document.getElementById("instituteList");
    if(data.nearby_institutions?.length > 0) {
      data.nearby_institutions.forEach(inst => {
        instList.innerHTML += `<div class="inst-item"><span>🎓 ${inst.name}</span><strong>${inst.dist} km</strong></div>`;
      });
    } else {
      instList.innerHTML = "<p style='font-size:13px; opacity:0.5;'>No nearby institutions listed.</p>";
    }

    renderGallery(data.image_urls);

    if (currentUser && currentUser.id === data.user_id) {
      document.querySelectorAll(".edit-icon").forEach(el => el.style.display = "inline");
      document.getElementById("deleteBtn").style.display = "block";
    }
  }

  function startEdit(fieldId) {
    document.getElementById(fieldId + "Display").style.display = "none";
    document.getElementById(fieldId + "Edit").style.display = "block";
    const mapping = { roomTitle: 'hostel_name', roomRent: 'rent', roomLocation: 'location', roomDescription: 'sharing_type' };
    document.getElementById(fieldId + "Input").value = roomData[mapping[fieldId]];
  }

  function cancelEdit(fieldId) {
    document.getElementById(fieldId + "Display").style.display = "block";
    document.getElementById(fieldId + "Edit").style.display = "none";
  }

  async function saveEdit(dbField, fieldId) {
    const saveBtn = document.querySelector(`#${fieldId}Edit .btn`);
    const newValue = document.getElementById(fieldId + "Input").value.trim();
    if(!newValue) return;

    saveBtn.innerText = "⏳";
    const { error } = await supabaseClient.from("hostels").update({ [dbField]: newValue }).eq("id", currentRoomId);
    
    if (!error) {
      roomData[dbField] = newValue;
      document.getElementById(fieldId + "Display").innerText = newValue;
      cancelEdit(fieldId);
    }
    saveBtn.innerText = "SAVE";
  }

  function renderGallery(urls) {
    const mainImg = document.getElementById("mainRoomImage");
    const thumbRow = document.getElementById("thumbnailRow");
    if (!urls || urls.length === 0) {
      mainImg.src = "https://via.placeholder.com/800x800?text=No+Images";
      return;
    }
    document.getElementById("prevBtn").style.display = urls.length > 1 ? "flex" : "none";
    document.getElementById("nextBtn").style.display = urls.length > 1 ? "flex" : "none";
    mainImg.src = urls[currentImageIndex];
    urls.forEach((url, i) => {
      const img = document.createElement("img");
      img.src = url;
      img.className = i === currentImageIndex ? "thumb-img active" : "thumb-img";
      img.onclick = () => { currentImageIndex = i; updateMainImage(); };
      thumbRow.appendChild(img);
    });
  }

  function changeImage(direction) {
    const urls = roomData.image_urls;
    currentImageIndex = (currentImageIndex + direction + urls.length) % urls.length;
    updateMainImage();
  }

  function updateMainImage() {
    document.getElementById("mainRoomImage").src = roomData.image_urls[currentImageIndex];
    document.querySelectorAll(".thumb-img").forEach((t, i) => {
      t.classList.toggle("active", i === currentImageIndex);
    });
  }

  async function deleteRoom() {
    if (!confirm("Remove room listing permanently?")) return;
    const { error } = await supabaseClient.from("hostels").delete().eq("id", currentRoomId);
    if (!error) window.location.href = "hostel.html";
  }

  init();
</script>
</body>
</html>
