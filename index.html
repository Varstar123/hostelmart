<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hostel Mart | Premium Campus Marketplace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="global.js" defer></script>
  <script src="footer.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* --- MODERN CSS VARIABLES --- */
    :root {
      --bg-main: #ffffff;
      --bg-header: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --btn-border: #0f172a;
      --btn-text: #0f172a;
      --btn-hover-bg: #0f172a;
      --btn-hover-text: #ffffff;
      --profile-bg: #f8fafc;
      --sidebar-hover: #f1f5f9;
      --skeleton-bg: #f1f5f9;
      --skeleton-shimmer: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);
      --price-color: #0f172a; /* Default dark text for light mode */
    }

    body.dark-mode {
      --bg-main: #0f172a;
      --bg-header: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: #1e293b;
      --card-border: #334155;
      --btn-border: #ffffff;
      --btn-text: #ffffff;
      --btn-hover-bg: #ffffff;
      --btn-hover-text: #0f172a;
      --profile-bg: #1e293b;
      --sidebar-hover: #1e293b;
      --skeleton-bg: #334155;
      --skeleton-shimmer: linear-gradient(90deg, #334155 0%, #475569 50%, #334155 100%);
      --price-color: #ffffff; /* White text for dark mode */
    }

    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); transition: background 0.4s ease, color 0.4s; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

    .logo-font { font-family: 'Outfit', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }

    /* --- PREMIUM BUTTON SYSTEM --- */
    .btn { 
      padding: 10px 22px; border-radius: 8px; border: 1.5px solid var(--btn-border); background: transparent; color: var(--btn-text); 
      font-weight: 600; font-size: 13px; text-decoration: none; transition: 0.3s; display: inline-block; cursor: pointer; text-align: center;
      font-family: 'Outfit', sans-serif; letter-spacing: 0.5px;
    }
    .btn:hover { background: var(--btn-hover-bg); color: var(--btn-hover-text); transform: translateY(-2px); }
    .btn-sm { padding: 6px 14px; font-size: 11px; }

    /* --- HEADER --- */
    header { background: var(--bg-header); padding: 14px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 0 var(--card-border); position: sticky; top: 0; z-index: 100; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    
    .profile-btn { 
      border: 1.5px solid var(--card-border); background: var(--profile-bg); border-radius: 50%; width: 42px; height: 42px; 
      display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; 
      overflow: hidden; padding: 0;
    }
    .profile-btn:hover { border-color: var(--btn-border); transform: scale(1.05); }
    .profile-btn img { width: 100%; height: 100%; object-fit: cover; }

    /* --- SIDEBAR --- */
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 999; opacity: 0; visibility: hidden; transition: 0.3s; }
    .sidebar-overlay.active { opacity: 1; visibility: visible; }
    .sidebar { 
      position: fixed; top: 0; left: -320px; width: 300px; height: 100vh; background: var(--bg-header); z-index: 1000; 
      transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; border-right: 1px solid var(--card-border); 
    }
    .sidebar.active { left: 0; }
    
    .sidebar-header { padding: 25px; border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 18px; color: var(--btn-border); }
    .sidebar-profile { padding: 35px 20px; text-align: center; background: linear-gradient(to bottom, var(--profile-bg), transparent); }
    .avatar-wrapper { width: 85px; height: 85px; margin: 0 auto; border-radius: 50%; background: var(--bg-main); display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--card-border); box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative; overflow: hidden; }
    .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    
    .sidebar-menu { list-style: none; padding: 10px 15px; margin: 0; flex-grow: 1; }
    .sidebar-menu li { margin-bottom: 8px; }
    .sidebar-menu button, .sidebar-menu a { width: 100%; text-align: left; padding: 12px 16px; border-radius: 12px; background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; align-items: center; gap: 14px; text-decoration: none; font-family: 'Outfit', sans-serif; font-weight: 500; font-size: 14px; transition: 0.2s ease; }
    .sidebar-menu button:hover, .sidebar-menu a:hover { background: var(--sidebar-hover); color: var(--accent); }

    .menu-icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.8; }

    .sidebar-footer { padding: 20px; border-top: 1px solid var(--card-border); }
    .theme-toggle-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px; margin-bottom: 10px; }
    .switch { position: relative; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #cbd5e1; transition: .4s; border-radius: 34px; }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background: var(--btn-border); }
    input:checked + .slider:before { transform: translateX(20px); }

    /* Hero Section */
    .hero { height: 65vh; min-height: 500px; display: flex; align-items: center; justify-content: center; text-align: center; background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.75)), url('https://images.unsplash.com/photo-1523240795612-9a054b0db644?q=80&w=2070'); background-size: cover; background-position: center; color: white; padding: 0 20px; }
    .hero h1 { font-size: clamp(38px, 7vw, 64px); margin-bottom: 20px; line-height: 1; }
    .hero p { font-size: 18px; max-width: 600px; margin: 0 auto 40px; color: #cbd5e1; font-weight: 300; line-height: 1.6; }

    /* Categories & Grid */
    .categories-section { padding: 80px 5% 40px; max-width: 1200px; margin: auto; text-align: center; }
    .category-filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 40px; }
    .cat-btn { padding: 8px 22px; border-radius: 50px; border: 1.5px solid var(--card-border); background: transparent; color: var(--text-muted); font-weight: 700; font-size: 12px; cursor: pointer; transition: 0.3s; font-family: 'Outfit', sans-serif; letter-spacing: 1px; }
    .cat-btn.active { border-color: var(--btn-border); background: var(--btn-hover-bg); color: var(--btn-hover-text); }
    .search-container { max-width: 600px; margin: 0 auto; position: relative; }
    .search-container input { width: 100%; padding: 16px 20px 16px 54px; border-radius: 14px; border: 1.5px solid var(--card-border); background: var(--card-bg); color: var(--text-main); font-family: inherit; font-size: 15px; transition: 0.3s; box-sizing: border-box; }
    .search-container input:focus { outline: none; border-color: var(--btn-border); box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }

    .products-section { padding: 40px 5% 100px; max-width: 1200px; margin: auto; flex: 1; width: 100%; box-sizing: border-box; }
    
    /* Grid - MULTI-COLUMN RESTORED */
    .grid { 
      display: grid !important; 
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)) !important; 
      gap: 25px; 
      width: 100%;
    }

    .card { 
      background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--card-border); 
      transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease; 
      display: flex; flex-direction: column; position: relative;
    }
    .card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.12); border-color: var(--btn-border); }
    
    .img-container { position: relative; height: 180px; overflow: hidden; background: #f1f5f9; }
    .card img { width: 100%; height: 100%; object-fit: cover; } 

    /* SLICK LOCATION BADGE */
    .location-badge { 
      position: absolute; top: 12px; right: 12px; background: rgba(255, 255, 255, 0.95); 
      padding: 4px 12px; border-radius: 50px; font-size: 10px; font-weight: 700; color: #0f172a;
      z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 5px;
      border: 1px solid var(--card-border);
    }
    .badge-icon { width: 12px; height: 12px; stroke: currentColor; stroke-width: 2.5; fill: none; }

    .card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .category-tag { font-family: 'Outfit', sans-serif; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
    
    /* UPDATED PRICE COLOR TO WHITE */
    .price { font-family: 'Outfit', sans-serif; font-size: 19px; font-weight: 700; color: var(--price-color); margin-bottom: 15px; }

    /* --- SKELETON ANIMATION --- */
    @keyframes shimmer { 
      0% { background-position: -200% 0; } 
      100% { background-position: 200% 0; } 
    }
    
    .skeleton { 
      background: var(--skeleton-shimmer); 
      background-size: 200% 100%; 
      animation: shimmer 1.5s infinite linear; 
    }
    .skeleton-img { height: 180px; width: 100%; border-radius: 0; }
    .skeleton-text { height: 12px; border-radius: 4px; background: var(--skeleton-bg); margin-bottom: 10px; }
    .skeleton-title { width: 70%; height: 16px; margin-top: 10px; }
    .skeleton-price { width: 40%; height: 20px; margin-top: 5px; }
  </style>
</head>
<body>

<script>
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark-mode');
  }
</script>

<svg style="display:none;">
  <symbol id="icon-user" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></symbol>
  <symbol id="icon-box" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></symbol>
  <symbol id="icon-plus" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></symbol>
  <symbol id="icon-home" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></symbol>
  <symbol id="icon-logout" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></symbol>
  <symbol id="icon-map-pin" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></symbol>
</svg>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="logo-font">Menu</span>
    <button onclick="toggleSidebar()" style="background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:20px;">✕</button>
  </div>
  <div class="sidebar-profile">
    <div class="avatar-wrapper" onclick="document.getElementById('avatarUpload').click()" style="cursor:pointer">
      <img id="sidebarAvatarImg" src="" style="display: none;">
      <svg class="menu-icon" id="sidebarAvatarFallback" style="width:35px; height:35px;"><use href="#icon-user"></use></svg>
    </div>
    <input type="file" id="avatarUpload" accept="image/*" style="display:none;" onchange="uploadAvatar(event)">
    <h3 id="sideName" style="margin:15px 0 0; font-family:'Outfit', sans-serif; font-size:18px;">Student User</h3>
    <p id="sideEmail" style="font-size:12px; color:var(--text-muted); font-weight:500;">email@college.edu</p>
  </div>
  <ul class="sidebar-menu">
    <li><button onclick="showMyItems()"><svg class="menu-icon"><use href="#icon-box"></use></svg> Your Listings</button></li>
    <li><a href="sell.html"><svg class="menu-icon"><use href="#icon-plus"></use></svg> Sell New Item</a></li>
    <li><a href="hostel.html"><svg class="menu-icon"><use href="#icon-home"></use></svg> Hostel Finder</a></li>
  </ul>
  <div class="sidebar-footer">
    <div class="theme-toggle-row">
      <span style="font-size:11px; font-weight:800; font-family:'Outfit', sans-serif; letter-spacing:1px; opacity:0.7;">DARK MODE</span>
      <label class="switch">
        <input type="checkbox" id="themeSwitch" onchange="toggleTheme()">
        <span class="slider"></span>
      </label>
    </div>
    <button type="button" onclick="logout()" style="color:#ef4444; padding:12px 16px; border-radius:12px; font-family:'Outfit', sans-serif; font-weight:600; font-size:14px; width:100%; text-align:left; background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:14px;">
      <svg class="menu-icon" style="stroke:#ef4444;"><use href="#icon-logout"></use></svg> Logout Account
    </button>
  </div>
</div>

<header>
  <div class="header-left">
    <button class="profile-btn" onclick="toggleSidebar()">
      <img id="headerAvatarImg" src="" style="display: none;">
      <svg class="menu-icon" id="headerAvatarFallback" style="width:20px; height:20px;"><use href="#icon-user"></use></svg>
    </button>
    <h2 class="logo-font" onclick="location.reload()" style="cursor:pointer; font-size:20px;">HOSTEL MART</h2>
  </div>
  <div class="header-actions">
    <a href="hostel.html" class="btn btn-sm">HOSTELS</a>
    <a href="sell.html" class="btn btn-sm">LIST ITEM</a>
  </div>
</header>

<section class="hero">
  <div>
    <h1 class="logo-font">CAMPUS<br>COMMERCE.</h1>
    <p>The premium student marketplace. Discover furniture, electronics, and rooms within your community.</p>
    <div style="display:flex; gap:15px; justify-content:center;">
      <a href="#products" class="btn" onclick="setCategory('All')">BROWSE MARKET</a>
      <a href="hostel.html" class="btn">FIND A ROOM</a>
    </div>
  </div>
</section>

<section class="categories-section" id="categories">
  <div class="category-filters">
    <button class="cat-btn active" onclick="setCategory('All', this)">ALL</button>
    <button class="cat-btn" onclick="setCategory('Furniture', this)">FURNITURE</button>
    <button class="cat-btn" onclick="setCategory('Electronics', this)">ELECTRONICS</button>
    <button class="cat-btn" onclick="setCategory('Books', this)">BOOKS</button>
    <button class="cat-btn" onclick="setCategory('Other', this)">OTHER</button>
  </div>
  <div class="search-container">
    <input type="text" id="mainSearch" placeholder="Search items, hostels, or locations..." oninput="applyFilters()">
  </div>
</section>

<section class="products-section" id="products">
  <div class="section-header">
    <h3 id="currentCategoryTitle" class="logo-font" style="margin:0; font-size: 20px;">Marketplace</h3>
    <span id="itemCount" style="font-size:11px; font-weight:800; color:var(--text-muted); letter-spacing:1px;">SYNCING...</span>
  </div>
  <div class="grid" id="itemsGrid">
    <div class="card"><div class="img-container skeleton"></div><div class="card-body"><div class="skeleton-text" style="width:30%"></div><div class="skeleton-text skeleton-title"></div><div class="skeleton-text skeleton-price"></div></div></div>
    <div class="card"><div class="img-container skeleton"></div><div class="card-body"><div class="skeleton-text" style="width:30%"></div><div class="skeleton-text skeleton-title"></div><div class="skeleton-text skeleton-price"></div></div></div>
    <div class="card"><div class="img-container skeleton"></div><div class="card-body"><div class="skeleton-text" style="width:30%"></div><div class="skeleton-text skeleton-title"></div><div class="skeleton-text skeleton-price"></div></div></div>
    <div class="card"><div class="img-container skeleton"></div><div class="card-body"><div class="skeleton-text" style="width:30%"></div><div class="skeleton-text skeleton-title"></div><div class="skeleton-text skeleton-price"></div></div></div>
  </div>
</section>

<script>
  const SUPABASE_URL = "https://uluwxacapyysyuwpmqtz.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsdXd4YWNhcHl5c3l1d3BtcXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODc0ODQsImV4cCI6MjA4NzI2MzQ4NH0.8dOeocJ5Q2tKy6gDu7rAmWgQqv_oetEXSGH2kWljZJo";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let allItems = [], myHostels = [], currentUser = null, activeCategory = "All";

  async function checkAuth() {
    const { data } = await supabaseClient.auth.getSession();
    if (!data.session) { window.location.href = "login.html"; return; }
    currentUser = data.session.user;

    if (localStorage.getItem('theme') === 'dark') {
        document.getElementById('themeSwitch').checked = true;
        document.body.classList.add('dark-mode');
    }

    document.getElementById("sideEmail").innerText = currentUser.email;
    document.getElementById("sideName").innerText = currentUser.user_metadata?.username || "Student User";
    
    if (currentUser.user_metadata?.avatar_url) {
      const url = currentUser.user_metadata.avatar_url;
      document.getElementById('sidebarAvatarImg').src = url;
      document.getElementById('sidebarAvatarImg').style.display = 'block';
      document.getElementById('headerAvatarImg').src = url;
      document.getElementById('headerAvatarImg').style.display = 'block';
      document.getElementById('sidebarAvatarFallback').style.display = 'none';
      document.getElementById('headerAvatarFallback').style.display = 'none';
    }
    loadAllData();
  }

  function toggleTheme() {
    const isDark = document.getElementById('themeSwitch').checked;
    document.body.classList.toggle('dark-mode', isDark);
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
    document.getElementById('sidebarOverlay').classList.toggle('active');
  }

  async function loadAllData() {
    const { data: items } = await supabaseClient.from("items").select("*").order("created_at", { ascending: false });
    const { data: hostels } = await supabaseClient.from("hostels").select("*").order("created_at", { ascending: false });
    allItems = items || [];
    myHostels = (hostels || []).map(h => ({ ...h, title: h.hostel_name, category: "HOSTEL", price: h.rent, isHostel: true }));
    applyFilters();
  }

  function setCategory(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
    applyFilters();
  }

  function applyFilters() {
    const query = document.getElementById("mainSearch").value.toLowerCase().trim();
    let list = activeCategory === "MyItems" ? 
      [...allItems.filter(i => i.user_id === currentUser.id), ...myHostels.filter(h => h.user_id === currentUser.id)] : 
      (activeCategory === "All" ? allItems : allItems.filter(i => i.category === activeCategory));

    if (query) list = list.filter(i => i.title?.toLowerCase().includes(query) || i.location?.toLowerCase().includes(query));
    renderItems(list);
  }

  function renderItems(list) {
    const container = document.getElementById("itemsGrid");
    document.getElementById("itemCount").innerText = `${list.length} LISTINGS FOUND`;
    container.innerHTML = list.length ? "" : "<p style='grid-column:1/-1; text-align:center; padding:50px; opacity:0.5;'>No listings found.</p>";

    list.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";
      const img = item.image_urls?.[0] || 'https://via.placeholder.com/400x300?text=No+Image';
      card.innerHTML = `
        <div class="img-container">
          <div class="location-badge">
            <svg class="badge-icon"><use href="#icon-map-pin"></use></svg>
            ${item.location || 'Campus'}
          </div>
          <img src="${img}" alt="${item.title}">
        </div>
        <div class="card-body">
          <span class="category-tag">${item.category}</span>
          <h4 class="logo-font" style="margin:0 0 10px; font-size:16px;">${item.title}</h4>
          <div class="price">₹${item.price}</div>
          <button class="btn btn-sm" onclick="goToDetails('${item.id}', ${!!item.isHostel})">
            ${item.user_id === currentUser.id ? 'EDIT LISTING' : 'VIEW DETAILS'}
          </button>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function goToDetails(id, isHostel) {
    localStorage.setItem("item_id", id);
    window.location.href = isHostel ? "room.html" : "item.html";
  }

  function showMyItems() {
    toggleSidebar(); activeCategory = "MyItems"; 
    document.getElementById("currentCategoryTitle").innerText = "YOUR LISTINGS";
    applyFilters();
  }

  async function logout() {
    try {
      const { error } = await supabaseClient.auth.signOut();
      if (error) throw error;
      window.location.replace("login.html"); 
    } catch (err) {
      console.error("Logout failed:", err.message);
      alert("Logout failed. Please try again.");
    }
  }

  async function uploadAvatar(event) {
    const file = event.target.files[0];
    if (!file) return;
    const fileName = `${currentUser.id}-${Date.now()}.${file.name.split('.').pop()}`;
    const { error: uploadError } = await supabaseClient.storage.from('avatars').upload(fileName, file);
    if (uploadError) return alert(uploadError.message);
    const { data: { publicUrl } } = supabaseClient.storage.from('avatars').getPublicUrl(fileName);
    await supabaseClient.auth.updateUser({ data: { avatar_url: publicUrl } });
    window.location.reload();
  }

  window.logout = logout;
  window.toggleSidebar = toggleSidebar;
  window.showMyItems = showMyItems;
