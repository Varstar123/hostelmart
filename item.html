<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Item Details | Hostel Mart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="global.js" defer></script>
  <script src="footer.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">

  <style>
    /* --- MODERN CSS VARIABLES --- */
    :root {
      --bg-main: #ffffff;
      --bg-header: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --btn-border: #0f172a;
      --btn-text: #0f172a;
      --btn-hover-bg: #0f172a;
      --btn-hover-text: #ffffff;
      --accent: #2563eb;
      --skeleton-bg: #f1f5f9;
      --skeleton-shimmer: linear-gradient(90deg, #f1f5f9 0%, #e2e8f0 50%, #f1f5f9 100%);
    }

    body.dark-mode {
      --bg-main: #0f172a;
      --bg-header: #0f172a;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: #1e293b;
      --card-border: #334155;
      --btn-border: #ffffff;
      --btn-text: #ffffff;
      --btn-hover-bg: #ffffff;
      --btn-hover-text: #0f172a;
      --skeleton-bg: #334155;
      --skeleton-shimmer: linear-gradient(90deg, #334155 0%, #475569 50%, #334155 100%);
    }

    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); transition: 0.3s; min-height: 100vh; }
    
    .logo-font { font-family: 'Outfit', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }

    header { background: var(--bg-header); padding: 14px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 0 var(--card-border); position: sticky; top: 0; z-index: 100; }
    header h2 { margin: 0; font-size: 20px; color: var(--btn-border); }

    .btn { 
      padding: 10px 22px; 
      border-radius: 8px; 
      border: 1.5px solid var(--btn-border); 
      background: transparent; 
      color: var(--btn-text); 
      font-weight: 600; 
      font-size: 13px; 
      text-decoration: none; 
      transition: all 0.3s ease; 
      display: inline-block; 
      cursor: pointer;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      letter-spacing: 0.5px;
    }
    .btn:hover { background: var(--btn-hover-bg); color: var(--btn-hover-text); transform: translateY(-2px); }
    .btn-secondary { background: transparent; border-color: var(--card-border); color: var(--text-muted); }
    .btn-danger { border-color: #ef4444; color: #ef4444; margin-top: 50px; }
    .btn-danger:hover { background: #ef4444; color: white; }

    .product-container { max-width: 1200px; margin: 40px auto; padding: 0 5%; display: grid; grid-template-columns: 1.1fr 1fr; gap: 60px; }
    
    .gallery-container { display: flex; flex-direction: column; gap: 16px; }
    .main-image-wrapper { 
      background: var(--card-bg); 
      border-radius: 28px; 
      border: 1px solid var(--card-border); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 500px; 
      position: relative; 
      overflow: hidden;
    }
    .main-image-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 12px; }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      color: var(--btn-text);
      border: 1px solid var(--card-border);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.3s;
      z-index: 2;
    }
    .main-image-wrapper:hover .nav-arrow { opacity: 1; }
    .arrow-left { left: 20px; }
    .arrow-right { right: 20px; }

    .thumbnail-row { display: flex; gap: 12px; overflow-x: auto; padding: 5px; }
    .thumb-img { width: 75px; height: 75px; object-fit: cover; border-radius: 14px; cursor: pointer; opacity: 0.5; border: 2px solid transparent; transition: 0.3s; }
    .thumb-img.active { border-color: var(--btn-border); opacity: 1; transform: translateY(-3px); }

    .details-section { display: flex; flex-direction: column; }
    .icon-svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; flex-shrink: 0; stroke-linecap: round; stroke-linejoin: round; }
    
    .editable-group { position: relative; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; width: 100%; }
    .edit-icon { cursor: pointer; width: 16px; height: 16px; opacity: 0; transition: 0.2s; color: var(--text-muted); stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .editable-group:hover .edit-icon { opacity: 1; }
    
    .product-title { margin: 0; font-size: 42px; font-weight: 700; font-family: 'Outfit', sans-serif; line-height: 1.1; }
    .price { font-size: 36px; font-weight: 800; color: #10b981; font-family: 'Outfit', sans-serif; margin: 10px 0; }
    .info-row { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-weight: 500; font-size: 15px; margin-bottom: 10px; }
    .description { font-size: 16px; line-height: 1.8; white-space: pre-wrap; color: var(--text-muted); margin: 20px 0 30px 0; }
    .inline-edit-input { font-family: 'Inter', sans-serif; font-size: inherit; background: var(--card-bg); border: 1.5px solid var(--btn-border); border-radius: 10px; padding: 10px 14px; width: 100%; outline: none; box-sizing: border-box; }
    .contact-section { padding-top: 30px; border-top: 1px solid var(--card-border); margin-top: 10px; }
    .contact-number { font-size: 24px; font-weight: 800; font-family: 'Outfit', sans-serif; color: var(--text-main); margin-top: 5px; display: flex; align-items: center; gap: 10px; }
    .category-badge { font-family: 'Outfit', sans-serif; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; color: var(--accent); background: rgba(37, 99, 235, 0.1); padding: 6px 12px; border-radius: 50px; text-transform: uppercase; width: fit-content; margin-bottom: 12px; }

    /* --- SKELETON STYLES --- */
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .skeleton { background: var(--skeleton-shimmer); background-size: 200% 100%; animation: shimmer 1.5s infinite linear; }
    .skeleton-box { border-radius: 28px; width: 100%; height: 500px; }
    .skeleton-text { height: 20px; background: var(--skeleton-bg); border-radius: 6px; margin-bottom: 15px; }
    .skeleton-badge { width: 80px; height: 25px; border-radius: 50px; margin-bottom: 20px; }
    .skeleton-title { width: 90%; height: 45px; }
    .skeleton-price { width: 50%; height: 40px; }
    .skeleton-desc { width: 100%; height: 120px; }
    .skeleton-thumb { width: 75px; height: 75px; border-radius: 14px; }

    @media (max-width: 768px) { 
        .product-container { grid-template-columns: 1fr; gap: 40px; } 
        .main-image-wrapper, .skeleton-box { height: 400px; }
    }
  </style>
</head>
<body>

<script>
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
</script>

<header>
  <h2 class="logo-font">Hostel Mart</h2>
  <div class="header-actions">
    <a href="index.html" class="btn btn-sm btn-secondary">← BACK TO MARKET</a>
  </div>
</header>

<div class="product-container" id="skeletonState">
  <div class="gallery-container">
    <div class="skeleton-box skeleton"></div>
    <div class="thumbnail-row">
      <div class="skeleton-thumb skeleton"></div>
      <div class="skeleton-thumb skeleton"></div>
      <div class="skeleton-thumb skeleton"></div>
    </div>
  </div>
  <div class="details-section">
    <div class="skeleton-badge skeleton"></div>
    <div class="skeleton-text skeleton-title skeleton"></div>
    <div class="skeleton-text skeleton-price skeleton"></div>
    <div style="margin-top: 30px;">
        <div class="skeleton-text skeleton-desc skeleton"></div>
        <div class="skeleton-text skeleton" style="width: 60%"></div>
    </div>
  </div>
</div>

<div class="product-container" id="productContent" style="display: none;">
  <div class="gallery-container">
    <div class="main-image-wrapper">
      <button class="nav-arrow arrow-left" id="prevBtn" onclick="changeImage(-1)">❮</button>
      <img id="mainItemImage" src="" alt="Item">
      <button class="nav-arrow arrow-right" id="nextBtn" onclick="changeImage(1)">❯</button>
    </div>
    <div class="thumbnail-row" id="thumbnailRow"></div>
    <div id="ownerImageAction" style="display:none; margin-top:10px;">
        <input type="file" id="newImageUpload" multiple style="display:none;" onchange="handleImageUpdate(event)">
        <button id="changePhotosBtn" class="btn btn-sm btn-secondary" style="width:100%" onclick="document.getElementById('newImageUpload').click()">CHANGE PHOTOS</button>
    </div>
  </div>

  <div class="details-section">
    <div class="category-badge" id="categoryDisplay">CATEGORY</div>
    
    <div class="editable-group">
      <h1 class="product-title" id="itemTitleDisplay">Title</h1>
      <svg class="edit-icon" onclick="startEdit('itemTitle')" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      <div id="itemTitleEdit" style="display:none; width:100%;">
        <input type="text" id="itemTitleInput" class="inline-edit-input">
        <div style="display: flex; gap: 8px; margin-top: 10px;">
          <button class="btn btn-sm" onclick="saveEdit('title', 'itemTitle')">SAVE</button>
          <button class="btn btn-sm btn-secondary" onclick="cancelEdit('itemTitle')">CANCEL</button>
        </div>
      </div>
    </div>

    <div class="editable-group">
      <div class="price">₹<span id="itemPriceDisplay">0</span></div>
      <svg class="edit-icon" onclick="startEdit('itemPrice')" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      <div id="itemPriceEdit" style="display:none; width:100%;">
        <input type="number" id="itemPriceInput" class="inline-edit-input">
        <div style="display: flex; gap: 8px; margin-top: 10px;">
          <button class="btn btn-sm" onclick="saveEdit('price', 'itemPrice')">SAVE</button>
          <button class="btn btn-sm btn-secondary" onclick="cancelEdit('itemPrice')">CANCEL</button>
        </div>
      </div>
    </div>

    <div class="editable-group">
      <div class="info-row">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        <span id="itemLocationDisplay">Location</span>
      </div>
      <svg class="edit-icon" onclick="startEdit('itemLocation')" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      <div id="itemLocationEdit" style="display:none; width:100%;">
        <input type="text" id="itemLocationInput" class="inline-edit-input">
        <div style="display: flex; gap: 8px; margin-top: 10px;">
          <button class="btn btn-sm" onclick="saveEdit('location', 'itemLocation')">SAVE</button>
          <button class="btn btn-sm btn-secondary" onclick="cancelEdit('itemLocation')">CANCEL</button>
        </div>
      </div>
    </div>

    <div class="editable-group">
      <div class="description" id="itemDescriptionDisplay">Description...</div>
      <svg class="edit-icon" onclick="startEdit('itemDescription')" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      <div id="itemDescriptionEdit" style="display:none; width:100%;">
        <textarea id="itemDescriptionInput" class="inline-edit-input" style="height:150px;"></textarea>
        <div style="display: flex; gap: 8px; margin-top: 10px;">
          <button class="btn btn-sm" onclick="saveEdit('description', 'itemDescription')">SAVE</button>
          <button class="btn btn-sm btn-secondary" onclick="cancelEdit('itemDescription')">CANCEL</button>
        </div>
      </div>
    </div>

    <div class="contact-section">
      <div class="info-row" style="margin-bottom: 5px; opacity: 0.6; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;">
        <svg class="icon-svg" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        Seller Contact
      </div>
      <div class="contact-number" id="phoneNumber">--</div>
      <button class="btn btn-danger btn-sm" style="width:100%; display:none; margin-top: 40px;" id="deleteBtn" onclick="deleteItem()">REMOVE THIS LISTING</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://uluwxacapyysyuwpmqtz.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsdXd4YWNhcHl5c3l1d3BtcXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODc0ODQsImV4cCI6MjA4NzI2MzQ4NH0.8dOeocJ5Q2tKy6gDu7rAmWgQqv_oetEXSGH2kWljZJo";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser, currentItemId, itemData;
  let currentImageIndex = 0; 

  async function init() {
    currentItemId = localStorage.getItem("item_id");
    const { data: { session } } = await supabaseClient.auth.getSession();
    currentUser = session?.user;
    loadItem();
  }

  async function loadItem() {
    const { data, error } = await supabaseClient.from("items").select("*").eq("id", currentItemId).single();
    
    if (error) {
        document.getElementById("skeletonState").style.display = "none";
        document.body.innerHTML += `<div style="text-align:center; margin-top:100px; font-family:'Outfit'; opacity:0.5;">Item not found.</div>`;
        return;
    }
    
    itemData = data;
    document.getElementById("skeletonState").style.display = "none";
    document.getElementById("productContent").style.display = "grid";

    document.getElementById("itemTitleDisplay").innerText = data.title;
    document.getElementById("itemPriceDisplay").innerText = data.price;
    document.getElementById("itemLocationDisplay").innerText = data.location;
    document.getElementById("itemDescriptionDisplay").innerText = data.description;
    document.getElementById("phoneNumber").innerText = data.contact_number;
    document.getElementById("categoryDisplay").innerText = data.category;
    
    renderGallery(data.image_urls);

    if (currentUser && currentUser.id === data.user_id) {
      document.querySelectorAll(".edit-icon").forEach(el => el.style.display = "inline-block");
      document.getElementById("deleteBtn").style.display = "block";
      document.getElementById("ownerImageAction").style.display = "block";
    }
  }

  function renderGallery(urls) {
    const mainImg = document.getElementById("mainItemImage");
    const thumbRow = document.getElementById("thumbnailRow");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    thumbRow.innerHTML = "";
    if (!urls || urls.length === 0) {
      mainImg.src = "https://via.placeholder.com/800x800?text=No+Images";
      prevBtn.style.display = "none";
      nextBtn.style.display = "none";
      return;
    }

    prevBtn.style.display = urls.length > 1 ? "flex" : "none";
    nextBtn.style.display = urls.length > 1 ? "flex" : "none";
    mainImg.src = urls[currentImageIndex];

    urls.forEach((url, i) => {
      const img = document.createElement("img");
      img.src = url;
      img.className = i === currentImageIndex ? "thumb-img active" : "thumb-img";
      img.onclick = () => { currentImageIndex = i; updateMainImage(); };
      thumbRow.appendChild(img);
    });
  }

  function changeImage(direction) {
    const urls = itemData.image_urls;
    currentImageIndex = (currentImageIndex + direction + urls.length) % urls.length;
    updateMainImage();
  }

  function updateMainImage() {
    const urls = itemData.image_urls;
    const mainImg = document.getElementById("mainItemImage");
    mainImg.src = urls[currentImageIndex];
    document.querySelectorAll(".thumb-img").forEach((t, i) => {
      t.classList.toggle("active", i === currentImageIndex);
    });
  }

  function startEdit(fieldId) {
    document.getElementById(fieldId + "Display").style.display = "none";
    document.getElementById(fieldId + "Edit").style.display = "block";
    const dbField = fieldId.replace('item', '').toLowerCase();
    document.getElementById(fieldId + "Input").value = itemData[dbField];
  }

  function cancelEdit(fieldId) {
    document.getElementById(fieldId + "Display").style.display = "block";
    document.getElementById(fieldId + "Edit").style.display = "none";
  }

  async function saveEdit(dbField, fieldId) {
    const saveBtn = document.querySelector(`#${fieldId}Edit .btn`);
    const newValue = document.getElementById(fieldId + "Input").value.trim();
    if(!newValue) return alert("Value cannot be empty");

    saveBtn.disabled = true;
    saveBtn.innerText = "⏳";

    const { error } = await supabaseClient.from("items").update({ [dbField]: newValue }).eq("id", currentItemId);
    
    if (!error) {
      itemData[dbField] = newValue;
      document.getElementById(fieldId + "Display").innerText = newValue;
      cancelEdit(fieldId);
    } else {
      alert("Error: " + error.message);
    }
    saveBtn.disabled = false;
    saveBtn.innerText = "SAVE";
  }

  async function handleImageUpdate(e) {
    const files = Array.from(e.target.files);
    if (files.length > 4) return alert("Max 4 images allowed.");
    const changeBtn = document.getElementById("changePhotosBtn");
    changeBtn.disabled = true;
    changeBtn.innerText = "UPLOADING...";

    const uploadedUrls = [];
    for (const file of files) {
      const path = `${currentUser.id}/${Date.now()}-${file.name}`;
      const { data, error } = await supabaseClient.storage.from("item-images").upload(path, file);
      if (!error) {
        const { data: { publicUrl } } = supabaseClient.storage.from("item-images").getPublicUrl(path);
        uploadedUrls.push(publicUrl);
      }
    }

    if (uploadedUrls.length > 0) {
      await supabaseClient.from("items").update({ image_urls: uploadedUrls }).eq("id", currentItemId);
      itemData.image_urls = uploadedUrls;
      currentImageIndex = 0;
      renderGallery(uploadedUrls);
    }
    changeBtn.disabled = false;
    changeBtn.innerText = "CHANGE PHOTOS";
  }

  async function deleteItem() {
    if (!confirm("Remove listing permanently?")) return;
    const btn = document.getElementById("deleteBtn");
    btn.disabled = true;
    btn.innerText = "DELETING...";

    if (itemData.image_urls?.length) {
      const paths = itemData.image_urls.map(url => url.split('item-images/')[1]);
      await supabaseClient.storage.from('item-images').remove(paths);
    }

    await supabaseClient.from("items").delete().eq("id", currentItemId);
    window.location.href = "index.html";
  }

  init();
</script>
</body>
</html>
