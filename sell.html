<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sell Item | Hostel Mart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="hm.png">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="global.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* --- MODERN CSS VARIABLES --- */
    :root {
      --bg: #ffffff; --card: #ffffff; --text: #0f172a; --text-muted: #64748b;
      --accent: #2563eb; --divider: #e2e8f0; 
      --btn-border: #0f172a; --btn-text: #0f172a; --btn-hover-bg: #0f172a;
      --btn-hover-text: #ffffff;
    }

    body.dark-mode {
      --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --text-muted: #94a3b8;
      --divider: #334155; --btn-border: #ffffff; --btn-text: #ffffff;
      --btn-hover-bg: #ffffff; --btn-hover-text: #0f172a;
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; min-height: 100vh; transition: background 0.3s ease; }
    .logo-font { font-family: 'Outfit', sans-serif; font-weight: 800; text-transform: uppercase; letter-spacing: -0.5px; }

    /* --- PREMIUM HEADER --- */
    header { padding: 14px 5%; background: var(--card); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 0 var(--divider); position: sticky; top: 0; z-index: 100; }
    .site-logo { height: 30px; width: auto; cursor: pointer; }
    .icon-svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

    /* --- BUTTONS --- */
    .btn { 
      padding: 10px 22px; border-radius: 8px; border: 1.5px solid var(--btn-border); background: transparent; color: var(--btn-text); 
      font-weight: 700; font-size: 13px; text-decoration: none; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
      font-family: 'Outfit', sans-serif; letter-spacing: 0.5px; outline: none; text-transform: uppercase;
    }
    .btn:hover { background: var(--btn-hover-bg); color: var(--btn-hover-text); transform: translateY(-2px); }
    .btn-secondary { border-color: var(--divider); color: var(--text); }
    .btn-sm { padding: 8px 14px; font-size: 11px; }

    /* --- LAYOUT --- */
    .container { max-width: 600px; margin: 40px auto; padding: 0 5%; width: 100%; box-sizing: border-box; }
    .sell-card { background: var(--card); padding: 40px; border-radius: 30px; border: 1px solid var(--divider); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

    /* --- FORM STYLING --- */
    .form-group { margin-bottom: 22px; }
    label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    input, select, textarea { width: 100%; padding: 14px 18px; border: 1.5px solid var(--divider); border-radius: 12px; background: var(--bg); color: var(--text); box-sizing: border-box; font-family: inherit; transition: 0.3s; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--btn-border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

    /* --- PREVIEWS --- */
    .preview-container { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
    .preview-wrapper { position: relative; width: 70px; height: 70px; border-radius: 12px; overflow: hidden; border: 1px solid var(--divider); }
    .preview-img { width: 100%; height: 100%; object-fit: cover; }
    .remove-btn { position: absolute; top: 2px; right: 2px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    #submitBtn { width: 100%; padding: 16px; background: var(--btn-border); color: var(--bg); border: none; border-radius: 12px; font-family: 'Outfit'; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
    #submitBtn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px -10px rgba(0,0,0,0.3); }
    #submitBtn:disabled { opacity: 0.5; cursor: not-allowed; }

    #statusMsg { margin-top: 15px; text-align: center; font-size: 13px; font-weight: 600; font-family: 'Outfit'; }

    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .sell-card { padding: 25px; border-radius: 20px; } }
  </style>
</head>
<body>

<script>
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
</script>

<header>
  <img src="hm.png" class="site-logo" alt="Hostel Mart" onclick="location.href='index.html'">
  <a href="index.html" class="btn btn-secondary btn-sm">
    <svg class="icon-svg" style="width:12px; height:12px;"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Back to Mart
  </a>
</header>

<div class="container">
  <div class="sell-card">
    <h2 class="logo-font" style="margin-top:0; font-size: 26px; border-bottom: 1px solid var(--divider); padding-bottom: 15px; margin-bottom: 25px;">Post Listing</h2>
    
    <div class="form-group">
      <label>Item Name</label>
      <input id="title" placeholder="What are you selling?">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="category">
          <option value="">Select...</option>
          <option value="Furniture">Furniture</option>
          <option value="Electronics">Electronics</option>
          <option value="Books">Books</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" id="price" placeholder="0">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Contact Number</label>
        <input id="contact" type="tel" placeholder="+91 0000000000">
      </div>
      <div class="form-group">
        <label>Location</label>
        <div style="display: flex; gap: 8px;">
          <input id="location" placeholder="City, District, State • ">
          <button type="button" id="getLocationBtn" class="btn btn-secondary btn-sm" style="padding: 0 12px;" title="Use GPS">
            <svg class="icon-svg"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="description" placeholder="Condition, usage time, details..." rows="3"></textarea>
    </div>

    <div class="form-group" style="margin-bottom: 30px;">
    <label style="margin-bottom: 12px; display: block; font-family: 'Outfit';">Photos (Max 4)</label>
    <input type="file" id="imageFile" multiple accept="image/*" style="display:none;" onchange="handleFileSelect(event)">
    
    <button type="button" class="btn btn-secondary btn-sm" 
            style="width: 100%; border: 1.5px dashed var(--divider); background: var(--input-bg); justify-content: center; margin-top: 5px; padding: 20px; display: flex; align-items: center; gap: 12px; border-radius: 12px; transition: 0.3s;" 
            onclick="document.getElementById('imageFile').click()">
        <svg class="icon-svg" viewBox="0 0 24 24" style="width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: 0.7;">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        <span style="font-family: 'Outfit'; font-weight: 600; color: var(--text-muted);">Select Images</span>
    </button>

    <div id="previewContainer" class="preview-container" style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;"></div>
</div>

    <button id="submitBtn" class="logo-font">PUBLISH LISTING</button>
    <p id="statusMsg" style="text-align: center; font-size: 13px; margin-top: 15px; font-weight: 600;"></p>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://uluwxacapyysyuwpmqtz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsdXd4YWNhcHl5c3l1d3BtcXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODc0ODQsImV4cCI6MjA4NzI2MzQ4NH0.8dOeocJ5Q2tKy6gDu7rAmWgQqv_oetEXSGH2kWljZJo";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUser = null;
  let selectedFilesArray = [];

  async function checkAuth() {
    const { data } = await supabaseClient.auth.getSession();
    if (!data.session) { location.href = "login.html"; return; }
    currentUser = data.session.user;
  }
  checkAuth();

  /* ================= PRESERVED PLACEHOLDER TICKER ================= */
  const locInput = document.getElementById("location");
  const scrollText = "City, District, State • ";
  let scrollIndex = 0;
  let isFetchingLocation = false;

  setInterval(() => {
    if (!isFetchingLocation && locInput.value === "" && document.activeElement !== locInput) {
      locInput.placeholder = scrollText.substring(scrollIndex) + scrollText.substring(0, scrollIndex);
      scrollIndex = (scrollIndex + 1) % scrollText.length;
    } else if (!isFetchingLocation && locInput.value === "") {
      locInput.placeholder = "City, District, State";
    }
  }, 180); 

  /* ================= GPS LOGIC ================= */
  const locBtn = document.getElementById("getLocationBtn");
  locBtn.onclick = () => {
    if (!navigator.geolocation) return alert("Geolocation not supported");
    isFetchingLocation = true;
    const originalIcon = locBtn.innerHTML;
    locBtn.innerText = "⏳";
    locInput.placeholder = "Fetching...";
    
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const { latitude, longitude } = pos.coords;
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
        const data = await res.json();
        const city = data.address.city || data.address.suburb || data.address.town || "";
        locInput.value = city ? `${city}, ${data.address.state || ""}` : `${latitude.toFixed(2)}, ${longitude.toFixed(2)}`;
      } catch (e) { locInput.value = `${latitude.toFixed(2)}, ${longitude.toFixed(2)}`; }
      isFetchingLocation = false;
      locBtn.innerHTML = originalIcon;
    }, (err) => {
      isFetchingLocation = false;
      locBtn.innerHTML = originalIcon;
      alert("Location access denied");
    });
  };

  /* ================= IMAGE LOGIC ================= */
  function handleFileSelect(e) {
    const files = Array.from(e.target.files);
    if (selectedFilesArray.length + files.length > 4) return alert("Max 4 images allowed");
    selectedFilesArray = selectedFilesArray.concat(files);
    renderPreviews();
    e.target.value = ""; 
  }

  function renderPreviews() {
    const container = document.getElementById('previewContainer');
    container.innerHTML = "";
    selectedFilesArray.forEach((file, i) => {
        const url = URL.createObjectURL(file);
        const wrapper = document.createElement("div");
        wrapper.className = "preview-wrapper";
        wrapper.innerHTML = `<img src="${url}" class="preview-img"><button class="remove-btn" onclick="removeImg(${i})">✕</button>`;
        container.appendChild(wrapper);
    });
  }

  window.removeImg = (i) => {
    selectedFilesArray.splice(i, 1);
    renderPreviews();
  };

  /* ================= SUBMIT ================= */
  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("statusMsg");

  btn.onclick = async () => {
    const title = document.getElementById("title").value.trim();
    const cat = document.getElementById("category").value;
    const price = document.getElementById("price").value;
    const contact = document.getElementById("contact").value.trim();
    const loc = document.getElementById("location").value.trim();

    if (!title || !cat || !price || !contact || !loc) return alert("Please fill all required fields");

    btn.disabled = true;
    btn.innerText = "UPLOADING...";

    const urls = [];
    for (let f of selectedFilesArray) {
      const path = `${currentUser.id}/${Date.now()}-${f.name}`;
      const { data } = await supabaseClient.storage.from('item-images').upload(path, f);
      if (data) {
        const { data: pUrl } = supabaseClient.storage.from('item-images').getPublicUrl(path);
        urls.push(pUrl.publicUrl);
      }
    }

    const { error } = await supabaseClient.from("items").insert({
      title, category: cat, price, contact_number: contact, 
      location: loc, image_urls: urls, user_id: currentUser.id,
      description: document.getElementById("description").value.trim()
    });

    if (error) {
      alert(error.message);
      btn.disabled = false;
      btn.innerText = "PUBLISH LISTING";
    } else {
      msg.style.color = "#16a34a";
      msg.innerText = "LISTING PUBLISHED! REDIRECTING...";
      setTimeout(() => location.href = "index.html", 1500);
    }
  };
</script>
</body>
</html>
