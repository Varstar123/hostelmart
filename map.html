<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Live Map | Hostel Mart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&display=swap" rel="stylesheet">

  <style>
    :root { --accent: #2563eb; --card: #ffffff; --text: #0f172a; }
    body.dark-mode { --card: #1e293b; --text: #f8fafc; }
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; }
    #map { height: 100vh; width: 100vw; z-index: 1; }

    /* --- MOBILE 3D POPUP STYLING --- */
    .leaflet-popup-content-wrapper { background: transparent !important; box-shadow: none !important; padding: 0 !important; }
    .leaflet-popup-tip-container { display: none; }

    .levitation-container {
      display: flex; flex-direction: column; align-items: center; width: 260px;
      animation: hoverFloating 3.5s ease-in-out infinite;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.6)); cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    model-viewer { 
      width: 260px; height: 240px; 
      background: transparent; outline: none; 
      pointer-events: auto; /* Allow touch rotation of the model */
    }

    .model-info-label {
      background: var(--card); color: var(--text); padding: 12px 20px; border-radius: 18px;
      text-align: center; width: 85%; margin-top: -35px; border: 1px solid rgba(255,255,255,0.1);
      font-family: 'Outfit', sans-serif; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 10;
    }

    @keyframes hoverFloating {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    .back-btn {
      position: absolute; top: 15px; left: 15px; z-index: 1000;
      background: white; padding: 10px 20px; border-radius: 50px;
      text-decoration: none; color: #0f172a; font-weight: 800; font-size: 14px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3); font-family: 'Outfit';
    }
  </style>
</head>
<body class="dark-mode">

<a href="hostel.html" class="back-btn">← BACK</a>
<div id="map"></div>

<script>
  const SUPABASE_URL = "https://uluwxacapyysyuwpmqtz.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsdXd4YWNhcHl5c3l1d3BtcXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODc0ODQsImV4cCI6MjA4NzI2MzQ4NH0.8dOeocJ5Q2tKy6gDu7rAmWgQqv_oetEXSGH2kWljZJo";
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let map;

  function initMap(lat, lon) {
    // Zoom in a bit more for mobile (level 16)
    map = L.map('map', { zoomControl: false }).setView([lat, lon], 16);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Current Location Marker (Green Dot)
    L.circleMarker([lat, lon], {
      radius: 7, fillColor: "#10b981", color: "#fff", weight: 2, fillOpacity: 1
    }).addTo(map);

    fetchAllHostels();
  }

  async function fetchAllHostels() {
    const { data: hostels, error } = await supabaseClient.from('hostels').select('*');
    if (error) return console.error(error);

    hostels.forEach(h => {
      // Priority 1: Use Precise GPS Coords from DB
      const lat = h.latitude;
      const lon = h.longitude;

      if (lat && lon) {
        const marker = L.circleMarker([lat, lon], {
          radius: 10, fillColor: "#2563eb", color: "#ffffff", weight: 2, fillOpacity: 1
        }).addTo(map);

        const popupContent = `
          <div class="levitation-container" onclick="openDetails('${h.id}')">
            <model-viewer 
              src="car.GLB" 
              autoplay shadow-intensity="1" 
              camera-controls touch-action="pan-y"
              disable-zoom auto-rotate>
            </model-viewer>
            <div class="model-info-label">
              <div style="font-size:16px; font-weight:800;">${h.hostel_name}</div>
              <div style="font-size:13px; color:#10b981; font-weight:700;">₹${h.rent}/mo</div>
              <div style="font-size:9px; opacity:0.6; margin-top:5px;">TAP TO VIEW</div>
            </div>
          </div>
        `;

        marker.bindPopup(popupContent, { maxWidth: 300 });
      }
    });
  }

  function openDetails(id) {
    localStorage.setItem('item_id', id);
    window.location.href = 'room.html';
  }

  // Use High Accuracy for phone GPS
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => initMap(pos.coords.latitude, pos.coords.longitude),
      () => initMap(10.0159, 76.3419), // Fallback Kochi
      { enableHighAccuracy: true, timeout: 10000 }
    );
  } else {
    initMap(10.0159, 76.3419);
  }
</script>
</body>
</html>
