<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard | Hostel Mart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      color: #0f172a;
    }

    /* --- HIDE APP BY DEFAULT --- */
    /* This prevents regular users from seeing a "flash" of the admin panel before being kicked out */
    #adminApp {
      display: none; 
    }

    /* --- HEADER --- */
    header { background: #1e293b; padding: 16px 5%; display: flex; justify-content: space-between; align-items: center; color: white; }
    header h2 { margin: 0; font-size: 20px; font-weight: 700; color: #38bdf8; }
    .btn { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; text-decoration: none; transition: all 0.2s; }
    .btn-outline { background: transparent; color: white; border: 1px solid #475569; }
    .btn-outline:hover { background: #334155; }

    /* --- DASHBOARD LAYOUT --- */
    .dashboard-container { max-width: 1200px; margin: 40px auto; padding: 0 5%; }
    .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .dashboard-header h1 { margin: 0; font-size: 28px; }

    /* --- TABLE STYLES --- */
    .table-wrapper { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow-x: auto; border: 1px solid #e2e8f0; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px; border-bottom: 1px solid #e2e8f0; }
    th { background: #f8fafc; font-weight: 600; font-size: 13px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
    td { font-size: 14px; color: #334155; }
    
    .item-img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
    .price-tag { font-weight: 700; color: #10b981; }

    /* Action Buttons */
    .action-btns { display: flex; gap: 8px; }
    .edit-btn { background: #fef9c3; color: #ca8a04; border: 1px solid #fde047; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s;}
    .edit-btn:hover { background: #fef08a; }
    .delete-btn { background: #fef2f2; color: #ef4444; border: 1px solid #fecaca; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 12px; transition: 0.2s;}
    .delete-btn:hover { background: #fca5a5; color: #b91c1c;}

    #statusMsg { padding: 16px; text-align: center; color: #64748b; font-weight: 500;}
  </style>
</head>
<body>

<div id="adminApp">
  <header>
    <h2>Hostel Mart Admin</h2>
    <a href="index.html" class="btn btn-outline">Exit Admin</a>
  </header>

  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1>Manage Marketplace Items</h1>
      <a href="sell.html" class="btn" style="background: #2563eb; color: white;">+ Add Item</a>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Image</th>
            <th>Title</th>
            <th>Category</th>
            <th>Price</th>
            <th>Location</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="adminTableBody">
          </tbody>
      </table>
      <div id="statusMsg">Loading database records...</div>
    </div>
  </div>
</div>

<script>
  /* ================= CONFIG ================= */
  const SUPABASE_URL = "https://uluwxacapyysyuwpmqtz.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVsdXd4YWNhcHl5c3l1d3BtcXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2ODc0ODQsImV4cCI6MjA4NzI2MzQ4NH0.8dOeocJ5Q2tKy6gDu7rAmWgQqv_oetEXSGH2kWljZJo";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });

  /* 🛡️ SECURITY: Define who is allowed in 🛡️ */
  // CHANGE THIS TO YOUR ACTUAL REGISTRATION EMAIL
  const ALLOWED_ADMIN_EMAILS = [
    "varunnarayan100@gmail.com", 
    "varstarcrypto@gmail.com" 
  ];

  /* ================= AUTH & AUTHORIZATION CHECK ================= */
  async function checkAdminAuth() {
    const { data } = await supabaseClient.auth.getSession();
    
    // 1. Are they logged in at all?
    if (!data.session) {
      window.location.href = "login.html";
      return;
    }

    const userEmail = data.session.user.email;

    // 2. Are they on the VIP Admin list?
    if (!ALLOWED_ADMIN_EMAILS.includes(userEmail)) {
      alert("🛑 Access Denied: You do not have administrator privileges.");
      window.location.href = "index.html"; // Kick them back to the marketplace
      return;
    }

    // 3. If they pass the checks, reveal the dashboard and load data
    document.getElementById("adminApp").style.display = "block";
    loadAdminItems();
  }

  /* ================= READ: Load all items ================= */
  async function loadAdminItems() {
    const tableBody = document.getElementById("adminTableBody");
    const statusMsg = document.getElementById("statusMsg");
    
    statusMsg.innerText = "Loading database records...";
    statusMsg.style.display = "block";
    tableBody.innerHTML = "";

    const { data, error } = await supabaseClient
      .from("items")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) {
      statusMsg.innerText = "Error loading items: " + error.message;
      statusMsg.style.color = "red";
      return;
    }

    if (data.length === 0) {
      statusMsg.innerText = "No items found in the database.";
      return;
    }

    statusMsg.style.display = "none";

    data.forEach(item => {
      const row = document.createElement("tr");

      let imgSrc = "https://via.placeholder.com/50x50?text=NA"; 
      if (item.image_urls && item.image_urls.length > 0) {
        imgSrc = Array.isArray(item.image_urls) ? item.image_urls[0] : item.image_urls;
      }

      row.innerHTML = `
        <td><img src="${imgSrc}" class="item-img" onerror="this.src='https://via.placeholder.com/50x50?text=NA'"></td>
        <td style="font-weight: 500;">${item.title}</td>
        <td>${item.category}</td>
        <td class="price-tag">₹${item.price}</td>
        <td>${item.location || "N/A"}</td>
        <td class="action-btns">
          <button class="edit-btn" onclick="updateItemPrice('${item.id}', '${item.title}', ${item.price})">Edit Price</button>
          <button class="delete-btn" onclick="deleteAdminItem('${item.id}', '${item.title}')">Delete</button>
        </td>
      `;
      tableBody.appendChild(row);
    });
  }

  /* ================= UPDATE: Change Price ================= */
  async function updateItemPrice(id, title, currentPrice) {
    const newPriceStr = prompt(`Enter new price for "${title}":`, currentPrice);
    if (newPriceStr === null || newPriceStr.trim() === "") return;
    
    const newPrice = Number(newPriceStr);
    if (isNaN(newPrice)) {
      alert("Please enter a valid number.");
      return;
    }

    const { error } = await supabaseClient
      .from("items")
      .update({ price: newPrice })
      .eq("id", id);

    if (error) {
      alert("Failed to update price: " + error.message);
    } else {
      loadAdminItems();
    }
  }

  /* ================= DELETE: Remove Item ================= */
  async function deleteAdminItem(id, title) {
    const confirmed = confirm(`WARNING: Are you sure you want to permanently delete "${title}"?`);
    if (!confirmed) return;

    const { error } = await supabaseClient
      .from("items")
      .delete()
      .eq("id", id);

    if (error) {
      alert("Failed to delete item: " + error.message);
    } else {
      loadAdminItems(); 
    }
  }

  // Init
  checkAdminAuth();
</script>

</body>
</html>
